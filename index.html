<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List Practice</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-panel" aria-labelledby="app-title">
        <div class="panel-header">
          <p class="eyebrow">Git Collaboration Practice</p>
          <h1 id="app-title">To-Do List 1</h1>
        </div>

        <form class="task-form" id="task-form">
          <label class="sr-only" for="task-input">Task name</label>
          <input
            id="task-input"
            name="task"
            type="text"
            placeholder="Add a new task"
            autocomplete="off"
          />
          <button type="submit">Add</button>
        </form>

        <p class="form-message" id="form-message" role="status" aria-live="polite"></p>

        <div class="filters" aria-label="Task filters">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="pending">Pending</button>
          <button class="filter-button" type="button" data-filter="completed">Completed</button>
        </div>

        <ul class="task-list" id="task-list" aria-label="Task list">i
          <li class="empty-state">No tasks yet. Add one to get started.</li>
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
